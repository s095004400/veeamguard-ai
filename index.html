<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeeamGuard AI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e1a; font-family: 'IBM Plex Mono', monospace; color: #e8edf5; min-height: 100vh; display: flex; flex-direction: column; }
  @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .header { padding: 16px 24px; border-bottom: 1px solid rgba(0,212,170,0.2); background: rgba(0,10,30,0.8); display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  .logo { width: 42px; height: 42px; border-radius: 10px; background: linear-gradient(135deg,#00d4aa,#0066ff); display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 20px rgba(0,212,170,0.4); }
  .header-title { font-size: 16px; font-weight: 600; letter-spacing: 1px; color: #00d4aa; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.4); }
  .status { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00d4aa; box-shadow: 0 0 8px #00d4aa; animation: pulse 2s ease-in-out infinite; }
  .messages { flex: 1; overflow-y: auto; padding: 24px 16px; max-width: 800px; width: 100%; margin: 0 auto; }
  .message { display: flex; margin-bottom: 16px; gap: 10px; align-items: flex-start; animation: fadeIn 0.3s ease-out; }
  .message.user { justify-content: flex-end; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .avatar.ai { background: linear-gradient(135deg,#00d4aa,#0066ff); box-shadow: 0 0 12px rgba(0,212,170,0.4); }
  .avatar.user { background: rgba(255,255,255,0.1); }
  .bubble { max-width: 75%; padding: 12px 16px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
  .bubble.ai { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px 18px 18px 4px; }
  .bubble.user { background: linear-gradient(135deg,#0066ff,#0044cc); border-radius: 18px 18px 4px 18px; box-shadow: 0 4px 15px rgba(0,102,255,0.3); }
  .typing { display: flex; gap: 5px; align-items: center; padding: 12px 0; }
  .typing span { width: 8px; height: 8px; border-radius: 50%; background: #00d4aa; animation: pulse 1.2s ease-in-out infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  .samples { max-width: 800px; width: 100%; margin: 0 auto; padding: 0 16px 12px; }
  .samples-label { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 8px; letter-spacing: 1px; }
  .sample-btn { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 12px; color: rgba(255,255,255,0.6); font-size: 12px; text-align: left; cursor: pointer; transition: all 0.2s; font-family: 'IBM Plex Mono'; margin-bottom: 6px; }
  .sample-btn:hover { background: rgba(0,212,170,0.15); border-color: rgba(0,212,170,0.6); transform: translateX(4px); }
  .input-area { border-top: 1px solid rgba(0,212,170,0.15); background: rgba(0,10,30,0.9); padding: 12px 16px 16px; }
  .input-wrap { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,212,170,0.25); border-radius: 12px; padding: 12px 14px; color: #e8edf5; font-size: 13px; font-family: 'IBM Plex Mono'; outline: none; resize: none; line-height: 1.6; transition: border-color 0.2s; }
  textarea:focus { border-color: rgba(0,212,170,0.6); }
  .send-btn { width: 48px; height: 48px; border-radius: 12px; background: linear-gradient(135deg,#00d4aa,#0066ff); border: none; cursor: pointer; font-size: 20px; transition: all 0.2s; flex-shrink: 0; }
  .send-btn:hover:not(:disabled) { transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,212,170,0.3); border-radius: 2px; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">🛡</div>
  <div>
    <div class="header-title">VeeamGuard AI</div>
    <div class="header-sub">Backup Alert Analysis Agent · Powered by Gemini</div>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    <span style="font-size:11px;color:#00d4aa">線上</span>
  </div>
</div>

<div class="messages" id="messages"></div>

<div class="samples" id="samples">
  <div class="samples-label">▸ 範例告警</div>
  <button class="sample-btn" onclick="sendMessage('Job Failed: VM-SQL-PROD-01 備份工作失敗，錯誤訊息：Failed to create VSS snapshot')">Job Failed: VM-SQL-PROD-01 備份工作失敗，錯誤訊息：Failed to create VSS snapshot</button>
  <button class="sample-btn" onclick="sendMessage('Repository Repo-Primary 容量剩餘 4.2%（48GB / 1.1TB），請立即處理')">Repository Repo-Primary 容量剩餘 4.2%（48GB / 1.1TB），請立即處理</button>
  <button class="sample-btn" onclick="sendMessage('RPO Violation: VM-ERP-SERVER 已超過 48 小時未成功備份')">RPO Violation: VM-ERP-SERVER 已超過 48 小時未成功備份</button>
  <button class="sample-btn" onclick="sendMessage('Veeam Agent: WIN-FILE-SRV-03 失去連線，最後心跳時間 2026-04-11 23:41')">Veeam Agent: WIN-FILE-SRV-03 失去連線，最後心跳時間 2026-04-11 23:41</button>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" rows="3" placeholder="貼上告警郵件內容，或描述備份問題... (Enter 送出，Shift+Enter 換行)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `你是一個專業的 Veeam 備份環境告警分析 Agent，名為 VeeamGuard AI。
你的專業能力：
1. 解析 VeeamOne 告警郵件內容，識別告警類型
2. 分析備份失敗根本原因（儲存空間、網路、快照、RPO違反等）
3. 依嚴重等級分類：Critical / High / Medium / Low
4. 提供具體的修復建議與操作步驟

常見告警類型與根因：
- Job Failed → VM快照問題、網路中斷、儲存庫空間不足
- Repository Full → 保留策略過長、備份點累積過多
- RPO Exceeded → 排程異常、上次成功備份時間過久
- Agent Not Connected → Veeam Agent離線、防火牆阻擋

回應時先判斷嚴重等級（🔴Critical 🟠High 🟡Medium 🟢Low），再分析根因，最後給處理步驟。使用繁體中文回應。`;

const API_KEY = 'AIzaSyColffuewyY452nS-5hSn_Q5GHCOwtE-xw';
let history = [];
let loading = false;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

function addMessage(role, content) {
  if (role !== 'system') history.push({ role: role === 'ai' ? 'model' : 'user', parts: [{ text: content }] });
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? '🛡' : '👤';
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = content;
  if (role === 'ai') { div.appendChild(avatar); div.appendChild(bubble); }
  else { div.appendChild(bubble); div.appendChild(avatar); }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'message ai'; div.id = 'typing';
  const avatar = document.createElement('div');
  avatar.className = 'avatar ai'; avatar.textContent = '🛡';
  const bubble = document.createElement('div');
  bubble.className = 'bubble ai';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  div.appendChild(avatar); div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() { const el = document.getElementById('typing'); if (el) el.remove(); }

async function sendMessage(text) {
  const content = text || inputEl.value.trim();
  if (!content || loading) return;
  inputEl.value = '';
  sendBtn.disabled = true;
  loading = true;
  addMessage('user', content);
  showTyping();
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: history.slice(0, -1),
        generationConfig: { maxOutputTokens: 1024 }
      })
    });
    const data = await res.json();
    hideTyping();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '❌ 無法取得回應';
    addMessage('ai', reply);
  } catch(e) {
    hideTyping();
    addMessage('ai', '❌ 連線錯誤，請稍後再試。');
  }
  loading = false;
  sendBtn.disabled = !inputEl.value.trim();
}

inputEl.addEventListener('input', () => { sendBtn.disabled = !inputEl.value.trim() || loading; });
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

addMessage('ai', '👋 我是 VeeamGuard AI，你的備份告警分析助手。\n\n請貼上 VeeamOne 的告警通知內容，或直接描述你遇到的備份問題，我會幫你分析根因並提供處理建議。\n\n你也可以點選下方的範例告警快速體驗。');
</script>
</body>
</html>
